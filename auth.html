<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathHub Pro | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-void: #020202;
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            margin: 0;
            background: var(--dark-void);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .auth-card {
            width: 90%;
            max-width: 400px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--border);
            border-top: 4px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            text-align: center;
        }

        h2 {
            font-family: 'Orbitron';
            color: var(--neon-cyan);
            font-size: 1.3rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .input-group { 
            margin-bottom: 20px; 
            text-align: left;
        }

        label {
            display: block;
            font-family: 'Orbitron';
            font-size: 0.65rem;
            margin-bottom: 8px;
            color: var(--neon-purple);
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'Rajdhani';
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .primary-btn {
            background: var(--neon-cyan);
            border: none;
            color: #000;
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px currentColor;
        }

        #status-msg {
            margin-top: 25px;
            font-size: 0.85rem;
            font-family: 'Orbitron';
            min-height: 1.5rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="title">> ACCESS_TERMINAL</h2>
        
        <div class="input-group">
            <label>USER_ID (EMAIL)</label>
            <input type="email" id="email" placeholder="ENTER EMAIL" required>
        </div>

        <div class="input-group">
            <label>SECURITY_KEY (PASSWORD)</label>
            <input type="password" id="password" placeholder="ENTER PASSWORD" required>
        </div>

        <div class="btn-container">
            <button class="primary-btn" onclick="processAuth('login')">Sign In</button>
            <button class="secondary-btn" onclick="processAuth('signup')">Sign Up</button>
        </div>

        <p id="status-msg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyeLN2tzrst4KTPA6vbLArf6AVgb1PxDo",
            authDomain: "math-hub-123.firebaseapp.com",
            projectId: "math-hub-123",
            storageBucket: "math-hub-123.firebasestorage.app",
            messagingSenderId: "649705586460",
            appId: "1:649705586460:web:ce86e65db4bd6b275404d9",
            measurementId: "G-FJVBJ9VN0Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Global function for the buttons
        window.processAuth = async (actionType) => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status-msg');

            if(!email || !password) {
                status.innerText = "!! DATA_MISSING";
                status.style.color = "#bc13fe"; 
                return;
            }

            status.innerText = "... PROCESSING ...";
            status.style.color = "#888";

            try {
                if (actionType === 'signup') {
                    await createUserWithEmailAndPassword(auth, email, password);
                    status.innerText = ">> ACCOUNT_DEPLOYED";
                    status.style.color = "#00f2ff"; 
                    setTimeout(() => window.location.href = "index.html", 1500);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    status.innerText = ">> ACCESS_GRANTED";
                    status.style.color = "#00f2ff"; 
                    setTimeout(() => window.location.href = "index.html", 1500);
                }
            } catch (error) {
                console.error("Auth Error:", error.code);
                // Convert errors like 'auth/email-already-in-use' to 'EMAIL_ALREADY_IN_USE'
                const errorCode = error.code.replace('auth/', '').replace(/-/g, '_').toUpperCase();
                status.innerText = "!! ERROR: " + errorCode;
                status.style.color = "#bc13fe";
            }
        };
    </script>
</body>
</html>
